<!DOCTYPE html>
<html>
<head>
    <title>Next Study</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe id="studyFrame" src="https://pw.primestudy.site/study"></iframe>

    <script>
        const frame = document.getElementById('studyFrame');
        
        frame.onload = function() {
            // Iframe ke andar ka content access karne ki koshish
            try {
                const doc = frame.contentDocument || frame.contentWindow.document;
                
                // 1. Logo Replace karo
                const logos = doc.querySelectorAll('img'); // Jo bhi logo image hai
                logos.forEach(img => {
                    if(img.src.includes('prime-study-logo-url')) {
                        img.src = 'https://kommodo.ai/i/BuQxmJIkeEWv0kl0UiQz';
                    }
                });

                // 2. Name Replace karo
                const textNodes = doc.body.innerText;
                doc.body.innerHTML = doc.body.innerHTML.replace(/Prime Study/g, 'Next Study');

                // 3. Telegram Link Replace karo
                const links = doc.querySelectorAll('a');
                links.forEach(link => {
                    if(link.href.includes('t.me/prime-study-link')) {
                        link.href = 'https://t.me/nextmodeapk';
                    }
                });
            } catch(e) {
                console.log("Security restriction: Iframe content edit nahi ho sakta.");
            }
        };
    </script>
</body>
</html>
